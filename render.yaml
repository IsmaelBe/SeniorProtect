databases:
  - name: senior-shield-db
    plan: free

services:
  - type: web
    name: senior-shield-api
    runtime: python
    rootDir: senior_shield
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: senior-shield-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: BASE_URL
        sync: false        # URL publique du service, ex https://senior-shield-api.onrender.com
      - key: FRONT_URL
        sync: false        # URL du front Lovable
      - key: GOOGLE_CLIENT_ID
        sync: false        # ID client OAuth Google
      - key: GOOGLE_CLIENT_SECRET
        sync: false        # secret client OAuth Google
