services:
  - type: web
    name: senior-shield-api
    runtime: python
    # Le code est à la RACINE du repo (pas de sous-dossier) -> pas de rootDir.
    buildCommand: pip install -r requirements.txt
    # L'app est dans main.py -> module "main" (surtout PAS "api").
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      # Base Postgres déjà créée à la main -> à coller dans le dashboard Render.
      - key: DATABASE_URL
        sync: false        # ex postgresql://user:pwd@host/dbname
      - key: SECRET_KEY
        generateValue: true
      - key: BASE_URL
        sync: false        # URL publique du service, ex https://senior-shield-api.onrender.com
      - key: FRONT_URL
        sync: false        # URL du front Lovable
      - key: GOOGLE_CLIENT_ID
        sync: false        # ID client OAuth Google
      - key: GOOGLE_CLIENT_SECRET
        sync: false        # secret client OAuth Google
